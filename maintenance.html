<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiln Maintenance</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: #f5f5f5; color: #111; min-height: 100vh; }
header { padding: .45rem 1rem; display: flex; align-items: center; justify-content: space-between; background: #F5A623; border-bottom: 2px solid #E09010; gap: .5rem; }
header h1 { font-size: .95rem; font-weight: 600; color: #1A1100; }
header a { font-size: 11px; color: rgba(26,17,0,0.65); text-decoration: none; }
header a:hover { color: #1A1100; }
.header-left { display: flex; align-items: center; gap: .65rem; }
.bodgery-logo { height: 36px; flex-shrink: 0; border-radius: 8px; }
.page { max-width: 900px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1.25rem; }
.section-title { font-size: 10px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .55rem; }
.component-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.comp-card { background: #fff; border-radius: 9px; padding: .75rem 1rem; border: 0.5px solid #e8e8e8; }
.comp-card .cc-name { font-size: 10px; color: #999; margin-bottom: .35rem; }
.comp-card .cc-count { font-size: 28px; font-weight: 500; line-height: 1; color: #111; }
.comp-card .cc-unit { font-size: 11px; color: #888; }
.comp-card .cc-since-label { font-size: 10px; color: #aaa; margin-top: 1px; }
.comp-card .cc-never { font-size: 13px; color: #ccc; }
.comp-card .cc-log-btn { margin-top: .6rem; font-size: 11px; background: none; border: 0.5px solid #ddd; border-radius: 5px; padding: 4px 9px; cursor: pointer; color: #666; display: block; }
.comp-card .cc-log-btn:hover { background: #f7f7f7; color: #333; }
.log-form { background: #fff; border-radius: 9px; padding: .9rem 1rem; border: 0.5px solid #e8e8e8; }
.log-form form { display: flex; flex-wrap: wrap; gap: .5rem; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 10px; color: #999; }
.field select, .field input { font-size: 13px; border: 0.5px solid #ddd; border-radius: 6px; padding: 6px 9px; background: #fafafa; color: #111; min-height: 34px; }
.field.grow { flex: 1; min-width: 160px; }
.field.grow input { width: 100%; }
.log-form button[type="submit"] { height: 34px; padding: 0 14px; background: #2d2d2d; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.log-form button[type="submit"]:hover { background: #444; }
.record-list { background: #fff; border-radius: 9px; border: 0.5px solid #e8e8e8; overflow: hidden; }
.record-item { padding: .65rem 1rem; border-bottom: 0.5px solid #f0f0f0; display: flex; align-items: flex-start; gap: .5rem; }
.record-item:last-child { border-bottom: none; }
.ri-body { flex: 1; min-width: 0; }
.ri-title { font-size: 13px; font-weight: 500; color: #222; }
.ri-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
.ri-notes { font-size: 11px; color: #777; margin-top: 2px; font-style: italic; }
.ri-badge { display: inline-block; font-size: 9px; background: #f0f0f0; color: #666; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
.ri-del { background: none; border: none; cursor: pointer; font-size: 13px; color: #ddd; padding: 4px 8px; flex-shrink: 0; line-height: 1; }
.ri-del:hover { color: #e74c3c; }
.empty { padding: 1.5rem; text-align: center; font-size: 12px; color: #ccc; }
@media (max-width: 600px) {
  .page { padding: .75rem; gap: 1rem; }
  .component-grid { grid-template-columns: repeat(2, 1fr); }
  .log-form form { flex-direction: column; }
  .field.grow { min-width: 0; }
  .field select, .field input, .log-form button[type="submit"] { width: 100%; }
}
@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #eee; }
  header { background: #2A1E00; border-color: #5A3A00; }
  header h1 { color: #FFD580; }
  header a { color: #8B6500; }
  .section-title { color: #555; }
  .comp-card, .log-form, .record-list { background: #222; border-color: #333; }
  .comp-card .cc-name { color: #666; }
  .comp-card .cc-count { color: #eee; }
  .comp-card .cc-unit, .comp-card .cc-since-label { color: #555; }
  .comp-card .cc-never { color: #444; }
  .comp-card .cc-log-btn { border-color: #444; color: #777; }
  .comp-card .cc-log-btn:hover { background: #2a2a2a; color: #aaa; }
  .field label { color: #666; }
  .field select, .field input { background: #2a2a2a; border-color: #444; color: #eee; }
  .log-form button[type="submit"] { background: #555; }
  .log-form button[type="submit"]:hover { background: #666; }
  .record-item { border-color: #2a2a2a; }
  .ri-title { color: #ddd; }
  .ri-meta { color: #555; }
  .ri-notes { color: #666; }
  .ri-badge { background: #333; color: #888; }
  .ri-del { color: #444; }
  .empty { color: #444; }
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <img src="/logo" class="bodgery-logo" alt="The Bodgery Ceramics">
    <h1>Kiln Maintenance</h1>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem">
    <button id="updateBtn" style="font-size:11px;border:1px solid rgba(26,17,0,0.25);border-radius:5px;padding:3px 10px;background:rgba(255,255,255,0.25);color:#1A1100;cursor:pointer">Update</button>
    <a href="/">&#8592; Live view</a>
  </div>
</header>
<div class="page">

  <div>
    <div class="section-title">Component Status</div>
    <div class="component-grid" id="compGrid"></div>
  </div>

  <div>
    <div class="section-title">Lifetime Firing Count</div>
    <div class="log-form">
      <form id="offsetForm">
        <div class="field grow">
          <label for="lifetimeInput">Offset (firings before tracking started)</label>
          <input type="number" id="lifetimeInput" min="0" placeholder="0" style="max-width:120px">
        </div>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <div>
    <div class="section-title">Log Replacement</div>
    <div class="log-form">
      <form id="logForm">
        <div class="field">
          <label for="compSel">Component</label>
          <select id="compSel" required>
            <option value="">&#8212; select &#8212;</option>
            <optgroup label="Heating Elements">
              <option value="elements">Elements</option>
            </optgroup>
            <optgroup label="Thermocouples">
              <option value="tc_z1">Thermocouple &#8212; Zone 1</option>
              <option value="tc_z2">Thermocouple &#8212; Zone 2</option>
              <option value="tc_z3">Thermocouple &#8212; Zone 3</option>
              <option value="tc_all">Thermocouples &#8212; All Zones</option>
            </optgroup>
            <optgroup label="Relays">
              <option value="relay_z1">Relay &#8212; Zone 1</option>
              <option value="relay_z2">Relay &#8212; Zone 2</option>
              <option value="relay_z3">Relay &#8212; Zone 3</option>
              <option value="relays_all">Relays &#8212; All Zones</option>
              <option value="contactor">Contactor</option>
            </optgroup>
          </select>
        </div>
        <div class="field grow">
          <label for="notesIn">Notes (optional)</label>
          <input type="text" id="notesIn" placeholder="e.g. L&amp;L elements, 22 gauge">
        </div>
        <button type="submit">Log Replacement</button>
      </form>
    </div>
  </div>

  <div>
    <div class="section-title">Replacement History</div>
    <div class="record-list" id="replList"></div>
  </div>

  <div>
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Firing History</span>
      <button id="editFireBtn" style="font-size:10px;border:0.5px solid #ddd;border-radius:4px;padding:2px 8px;background:none;color:#888;cursor:pointer">Edit</button>
    </div>
    <div class="record-list" id="firingList"></div>
  </div>

</div>
<script>
const COMP_DEFS = [
  { key: 'elements',  label: 'Elements',        matchKeys: ['elements'] },
  { key: 'tc_z1',    label: 'Thermocouple Z1',  matchKeys: ['tc_z1', 'tc_all'] },
  { key: 'tc_z2',    label: 'Thermocouple Z2',  matchKeys: ['tc_z2', 'tc_all'] },
  { key: 'tc_z3',    label: 'Thermocouple Z3',  matchKeys: ['tc_z3', 'tc_all'] },
  { key: 'relay_z1', label: 'Relay Z1',          matchKeys: ['relay_z1', 'relays_all'] },
  { key: 'relay_z2', label: 'Relay Z2',          matchKeys: ['relay_z2', 'relays_all'] },
  { key: 'relay_z3', label: 'Relay Z3',          matchKeys: ['relay_z3', 'relays_all'] },
  { key: 'contactor', label: 'Contactor',        matchKeys: ['contactor'] },
];
const COMP_LABELS = {
  elements:   'Elements',
  tc_z1:      'Thermocouple — Zone 1',
  tc_z2:      'Thermocouple — Zone 2',
  tc_z3:      'Thermocouple — Zone 3',
  tc_all:     'Thermocouples — All Zones',
  relay_z1:   'Relay — Zone 1',
  relay_z2:   'Relay — Zone 2',
  relay_z3:   'Relay — Zone 3',
  relays_all: 'Relays — All Zones',
  contactor:  'Contactor',
};

let data = { firings: [], replacements: [], total_firings: 0, lifetime_offset: 0 };

async function load() {
  try {
    const r = await fetch('/maint/data');
    data = await r.json();
    render();
    document.getElementById('lifetimeInput').value = data.lifetime_offset || 0;
  } catch(e) {
    console.error('Failed to load data', e);
  }
}

function lastRepl(compKey) {
  const def = COMP_DEFS.find(c => c.key === compKey);
  if (!def) return null;
  const hits = data.replacements.filter(r => def.matchKeys.includes(r.component));
  return hits.length ? hits[hits.length - 1] : null;
}

function renderCompGrid() {
  const grid = document.getElementById('compGrid');
  grid.innerHTML = '';
  COMP_DEFS.forEach(def => {
    const last = lastRepl(def.key);
    const since = last != null ? Math.max(0, data.total_firings - last.firing_count) : null;
    const card = document.createElement('div');
    card.className = 'comp-card';
    if (since != null) {
      card.innerHTML =
        `<div class="cc-name">${def.label}</div>` +
        `<div><span class="cc-count">${since}</span></div>` +
        `<div class="cc-since-label">firings since replaced</div>` +
        `<div class="cc-since-label" style="color:#bbb;margin-top:2px">${last.date}</div>` +
        `<button class="cc-log-btn" data-key="${def.key}">Log replacement</button>`;
    } else {
      card.innerHTML =
        `<div class="cc-name">${def.label}</div>` +
        `<div class="cc-never">No record</div>` +
        `<div class="cc-since-label" style="margin-top:4px">Never logged</div>` +
        `<button class="cc-log-btn" data-key="${def.key}">Log replacement</button>`;
    }
    grid.appendChild(card);
  });
  grid.querySelectorAll('.cc-log-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('compSel').value = btn.dataset.key;
      document.getElementById('logForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  });
}

function renderReplList() {
  const list = document.getElementById('replList');
  if (!data.replacements.length) {
    list.innerHTML = '<div class="empty">No replacements logged yet.</div>';
    return;
  }
  list.innerHTML = '';
  [...data.replacements].reverse().forEach(r => {
    const since = Math.max(0, data.total_firings - r.firing_count);
    const el = document.createElement('div');
    el.className = 'record-item';
    el.innerHTML =
      `<div class="ri-body">` +
        `<div class="ri-title">${COMP_LABELS[r.component] || r.component}</div>` +
        `<div class="ri-meta">${r.date} &middot; after firing #${r.firing_count} &middot; ${since} firing${since !== 1 ? 's' : ''} ago</div>` +
        (r.notes ? `<div class="ri-notes">${r.notes}</div>` : '') +
      `</div>` +
      `<button class="ri-del" data-id="${r.id}" title="Delete record">&#x1F5D1;</button>`;
    list.appendChild(el);
  });
  list.querySelectorAll('.ri-del').forEach(btn => {
    btn.addEventListener('click', () => deleteRepl(btn.dataset.id));
  });
}

let firingEditMode = false;

function renderFiringList() {
  const list = document.getElementById('firingList');
  if (!data.firings.length) {
    list.innerHTML = '<div class="empty">No past firings saved.</div>';
    return;
  }
  list.innerHTML = '';
  const reversed = [...data.firings].reverse();
  const total = data.firings.length;
  reversed.forEach((f, i) => {
    const num = total - i;
    const el = document.createElement('div');
    el.className = 'record-item';
    const dtp = f.duration_to_peak ? ` &middot; peak ${f.duration_to_peak}` : '';
    const canMerge = firingEditMode && i + 1 < reversed.length && reversed[i + 1].program === f.program;
    el.innerHTML =
      `<div class="ri-body">` +
        `<div class="ri-title">${f.label}</div>` +
        `<div class="ri-meta">Firing #${num} &middot; Peak: ${f.peak}&deg;F &middot; ${f.duration}${dtp}</div>` +
        (f.program ? `<span class="ri-badge">${f.program}</span>` : '') +
      `</div>` +
      (firingEditMode
        ? `<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">` +
            `<button class="ri-del" data-id="${f.id}" title="Delete firing">&#x1F5D1;</button>` +
            (canMerge ? `<button class="ri-merge" data-newer="${f.id}" data-older="${reversed[i+1].id}" title="Merge with firing below" style="font-size:10px;background:none;border:0.5px solid #ddd;border-radius:4px;padding:2px 5px;cursor:pointer;color:#888">&#8595;</button>` : '') +
          `</div>`
        : '');
    list.appendChild(el);
  });
  list.querySelectorAll('.ri-del').forEach(btn => {
    btn.addEventListener('click', () => deleteFiring(btn.dataset.id));
  });
  list.querySelectorAll('.ri-merge').forEach(btn => {
    btn.addEventListener('click', () => mergeFirings(btn.dataset.older, btn.dataset.newer));
  });
}

document.getElementById('editFireBtn').addEventListener('click', () => {
  firingEditMode = !firingEditMode;
  const btn = document.getElementById('editFireBtn');
  btn.textContent = firingEditMode ? 'Done' : 'Edit';
  btn.style.color = firingEditMode ? '#333' : '#888';
  renderFiringList();
});

async function mergeFirings(older_id, newer_id) {
  if (!confirm('Merge these two adjacent firings? The older one will absorb the newer one.')) return;
  try {
    const r = await fetch('/firing/merge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ older_id, newer_id }),
    });
    const d = await r.json();
    if (d.ok) {
      const oi = data.firings.findIndex(f => f.id === older_id);
      const ni = data.firings.findIndex(f => f.id === newer_id);
      if (oi !== -1) data.firings[oi] = d.merged;
      if (ni !== -1) data.firings.splice(ni, 1);
      render();
    } else { alert('Merge failed: ' + (d.error || 'unknown')); }
  } catch { alert('Error connecting to server.'); }
}

function render() {
  renderCompGrid();
  renderReplList();
  renderFiringList();
}

document.getElementById('logForm').addEventListener('submit', async e => {
  e.preventDefault();
  const component = document.getElementById('compSel').value;
  const notes     = document.getElementById('notesIn').value.trim();
  if (!component) return;
  try {
    const r = await fetch('/maint/replacement', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ component, notes }),
    });
    const d = await r.json();
    if (d.ok) {
      data.replacements.push(d.record);
      document.getElementById('compSel').value = '';
      document.getElementById('notesIn').value = '';
      render();
    } else {
      alert('Error: ' + (d.error || 'unknown'));
    }
  } catch(err) {
    alert('Could not connect to server.');
  }
});

async function deleteRepl(id) {
  if (!confirm('Delete this replacement record? This cannot be undone.')) return;
  try {
    const r = await fetch('/maint/replacement/' + id, { method: 'DELETE' });
    const d = await r.json();
    if (d.ok) {
      data.replacements = data.replacements.filter(r => r.id !== id);
      render();
    } else {
      alert('Could not delete record.');
    }
  } catch(err) {
    alert('Error connecting to server.');
  }
}

async function deleteFiring(id) {
  if (!confirm('Delete this firing? This cannot be undone.')) return;
  try {
    const r = await fetch('/firing/' + id, { method: 'DELETE' });
    const d = await r.json();
    if (d.ok) {
      data.firings = data.firings.filter(f => f.id !== id);
      data.total_firings = Math.max(0, data.total_firings - 1);
      render();
    } else {
      alert('Could not delete firing.');
    }
  } catch(err) {
    alert('Error connecting to server.');
  }
}

document.getElementById('updateBtn').addEventListener('click', async () => {
  const r0 = await fetch('/state').then(r => r.json()).catch(() => ({}));
  const isActive = ['firing', 'complete'].some(s => (r0.badge || '').includes(s));
  let confirm_str = '';
  if (isActive) {
    const input = prompt('Kiln is active! Type UPDATE to confirm restart:');
    if (input !== 'UPDATE') return;
    confirm_str = 'UPDATE';
  } else {
    if (!confirm('Pull latest code and restart the server?')) return;
  }
  const r = await fetch('/maint/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ confirm: confirm_str }),
  });
  const d = await r.json();
  if (d.needs_confirm) { alert('Kiln is active — type UPDATE to confirm.'); }
  else if (d.ok) { alert('Update applied! Server restarting…'); }
  else { alert('Update failed: ' + (d.error || 'unknown')); }
});

document.getElementById('offsetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const val = parseInt(document.getElementById('lifetimeInput').value, 10) || 0;
  try {
    const r = await fetch('/maint/adjust_count', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lifetime_offset: val }),
    });
    const d = await r.json();
    if (d.ok) {
      data.lifetime_offset = d.lifetime_offset;
      render();
    } else { alert('Error: ' + (d.error || 'unknown')); }
  } catch { alert('Could not connect.'); }
});

load();
</script>
</body>
</html>
